<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}Reader Pro{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme_default.css') }}">

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "serif": ["Lora", "serif"]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div class="flex h-screen overflow-hidden">
        
        {% include 'components/sidebar.html' %}

        <main class="flex-1 overflow-y-auto flex flex-col">
            
            {% include 'components/navbar.html' %}

            <div class="p-8 max-w-7xl mx-auto w-full space-y-10">
                {% block content %}{% endblock %}
            </div>

            <div class="mt-auto px-8 py-4 border-t border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-[#111318]/50 backdrop-blur-sm flex items-center justify-between">
                 <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary">local_library</span>
                    <p class="text-xs text-slate-500 font-medium italic">"Reading is a conversation. All books talk. But a good book listens as well." — Mark Haddon</p>
                </div>
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                        Library Synced
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
